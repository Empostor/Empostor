services:
  empostor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: empostor-server
    restart: unless-stopped
    ports:
      - "22023:22023/tcp"
      - "22023:22023/udp"
    volumes:
      - ./config.json:/app/config.json:ro
      - ./Log:/app/Log
      - ./plugins:/app/plugins
      - ./Languages:/app/Languages
      - ./marketplace:/app/marketplace
      - ./Data:/app/Data
    environment:
      - ASPNETCORE_URLS=http://0.0.0.0:80
      - EMPOSTOR_Server__PublicIp=0.0.0.0
